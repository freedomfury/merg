uc131:
  # Knockout combined with exclude_paths and dict-list mix:
  # exclude_paths protects 'guarded.token' from any change, while knockouts
  # remove 'beta' from features and wipe the 'fallback' region.
  option:
    knockout_prefix: '--'
    exclude_paths:
    - guarded.token
  source:
    features:
    - '--beta'
    - gdpr_banner
    regions:
      fallback: '--'
    guarded:
      token: HACKED
      label: new_label
  target:
    features:
    - alpha
    - beta
    - telemetry
    regions:
      primary: us-east
      fallback: us-west
    guarded:
      token: SECRET
      label: old_label
  answer:
    features:
    - alpha
    - telemetry
    - gdpr_banner
    regions:
      primary: us-east
      fallback: null
    guarded:
      token: SECRET
      label: new_label
